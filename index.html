<!DOCTYPE html>
<html>
<head>
<title>Simple Chatbot</title>

<style>
body {
    font-family: Arial;
    background: #f4f6fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chatbox {
    width: 350px;
    background:rgb(163, 63, 163);
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.messages {
    height: 250px;
    overflow-y: auto;
    margin-bottom: 10px;
}

.user, .bot {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
}

.user {
    background: #d4ffd4;
    text-align: right;
}

.bot {
    background: #e0ecff;
    text-align: left;
}

input {
    width: 75%;
    padding: 8px;
}

button {
    padding: 8px;
    background: #007bff;
    color: white;
    border: none;
}
</style>

</head>
<body>

<div class="chatbox">

    <div class="messages" id="messages"></div>

    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value.toLowerCase();
    let messages = document.getElementById("messages");

    // Show user message
    messages.innerHTML += `<div class="user">${input}</div>`;

    // Bot reply
    let reply = "Hello,how can i help you?";

    if (input === "hi") {
        reply = "hello";
    }

    messages.innerHTML += `<div class="bot">${reply}</div>`;

    document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
